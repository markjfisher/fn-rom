# Per-file setup: disk (literal *FIN argument — image name on the TNFS/host share, e.g. osfile.ssd),
# optional paste after *FMOUNT. --fhost-path always comes from the command line.
#
# delay_seconds:
#   - Screen checks: maximum time to poll the screen (every --screen-poll-interval, default 0.1s)
#     until expectations pass (no fixed pause first — exits as soon as it matches).
#   - Peek-only steps: ignored (peek runs immediately after paste).
#   - No checks (setup): fixed settle time after paste only.
#
# checks:
#   - screen: decode screen RAM (b2-http screen); optional overrides: start, wrap_adjustment, ...
#   - peek:    raw bytes from memory (b2-http peek BEGIN END); use one of:
#              expect_file (path relative to this YAML file),
#              expect_hex (pairs of hex digits),
#              expect_sha256 (hash of peek bytes)
# You can list several checks after one paste (e.g. screen then peek).

group: BBC / FS / OSFILE

disk: osfile.ssd

paste:
  - "MODE 7"
  - "*CAT"

steps:
  # Setup only — no checks, so no screen grab or peek.
  - name: unlock and delete any test files
    paste:
      - '*ACCESS Myself'
      - '*DELETE Myself'
      - 'CLS'

  - name: osf01
    paste:
      - 'CHAIN "OSF01"'
    delay_seconds: 6.0
    checks:
      - screen:
          expect:
            # We don't really need both of these here, but leaving it as an example
            contains:
              - "$.Myself"
            regex:
              # Create Myself
              - '\$\.Myself\s+001DC5\s+001DE0\s+000027\s+026'
      - peek:
          begin: "0e00"
          end: "0e08"
          expect_hex: "62 65 65 62 00 00 00 00"

  - name: osf02
    paste:
      - 'CHAIN "OSF02"'
    delay_seconds: 4.5
    checks:
      - screen:
          expect:
            regex:
              # Change the load/exec addresses
              - '\$\.Myself\s+001900\s+00191B\s+000027\s+026'

  - name: osf03
    paste:
      - 'CHAIN "OSF03"'
    delay_seconds: 4.5
    checks:
      - screen:
          expect:
            regex:
              # Change just load
              - '\$\.Myself\s+005000\s+00191B\s+000027\s+026'

  - name: osf04
    paste:
      - 'CHAIN "OSF04"'
    delay_seconds: 4.5
    checks:
      - screen:
          expect:
            regex:
              # Change just exec
              - '\$\.Myself\s+005000\s+00501B\s+000027\s+026'

  - name: info before lock
    paste:
      - 'CHAIN "OSF06"'
    delay_seconds: 4.5
    checks:
      - screen:
          expect:
            regex:
              # file is currently unlocked (status = 0)
              - 'load address = 5000'
              - 'xqt address = 501B'
              - 'size of file = 27'
              - 'lock status = 0'

  - name: osf05
    paste:
      - 'CHAIN "OSF05"'
    delay_seconds: 4.5
    checks:
      - screen:
          expect:
            regex:
              # lock the file
              - '\$\.Myself\s+L\s+005000\s+00501B\s+000027\s+026'

  - name: info after lock
    paste:
      - 'CHAIN "OSF06"'
    delay_seconds: 4.5
    checks:
      - screen:
          expect:
            regex:
              # file is currently unlocked
              - 'load address = 5000'
              - 'xqt address = 501B'
              - 'size of file = 27'
              - 'lock status = 8'

